{% extends "admin/base_site.html" %}
{% load i18n %}

{% block content %}
<div class="content">
  <h1>{{ title }}</h1>
  <p>Are you sure you want to delete <strong>all</strong> data for <strong>{{ target_date|date:"d M Y" }}</strong>?</p>
  <p>Number of rows to be deleted: <strong>{{ count }}</strong>.</p>
  <form method="post" action="?day={{ day_param }}">
    {% csrf_token %}
    <input type="hidden" name="day" value="{{ day_param }}">
    <input type="hidden" name="confirm" value="yes">
    <input type="submit" value="Yes, delete all data for this day" class="deletelink">
  </form>
  <p style="margin-top: 1em;">
    <a href="{% url 'admin:dashboard_warehouseaccountoverview_changelist' %}?day={{ day_param }}">Cancel (back to list)</a>
  </p>
</div>
{% endblock %}
